    <!-- Critical above-the-fold CSS -->
    <style>
      @font-face{font-family:'Inter';font-style:normal;font-weight:400 800;font-display:swap;src:url('/fonts/inter-latin.woff2') format('woff2')}
      @font-face{font-family:'Playfair Display';font-style:normal;font-weight:400 700;font-display:swap;src:url('/fonts/playfair-normal-latin.woff2') format('woff2')}

      h1,h2,h3,h4,h5,h6{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;font-weight:700;letter-spacing:-.025em}
